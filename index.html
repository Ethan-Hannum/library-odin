<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="stylesheet.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
</head>
<body>
        <div class="headers">
            <nav>
                <div class="logo-container">
                    <img src="images/book-open-blank-variant-outline.svg" alt="Outline of a book">
                </div>
                <ul class="links">
                    <li>Your Books</li>
                    <li>Login/Register</li>
                </ul>
            </nav>
            <div class="button-bar">
                <button command="show-modal" commandfor="add-book" id="new-book">New Book</button>
                <dialog id="add-book">
                    <form action="">
                        <label for="title">Title</label>
                        <input type="text" name="title" id="title">
                        <label for="author">Author</label>
                        <input type="text" name="author" id="author">
                        <label for="pages">Pages</label>
                        <input type="text" name="pages" id="pages">
                        <label for="status">Read?</label>
                        <input type="checkbox" name="status" id="status">
                        <button type="submit" commandfor="add-book" command="close" id="close-button">Add Book</button>
                    </form>
                </dialog>
            </div>
        </div>
        <main>
            <div class="book-collection"></div>
        </main>
    <script src="scripts.js"></script>
</body>
</html>
